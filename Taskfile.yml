# https://taskfile.dev
version: "3"

vars:
  NODE_BIN: ./node_modules/.bin

tasks:
  dev:
    desc: Start the Astro dev server
    cmd: npm run dev

  build:
    desc: Build the site for production
    cmd: npm run build

  preview:
    desc: Preview the production build locally
    cmd: npm run preview

  check:
    desc: Run Astro type checking
    cmd: npx astro check

  test:
    desc: Run unit tests
    cmd: npm run test

  format:
    desc: Format the codebase with Prettier
    cmd: npm run format

  format-check:
    desc: Check formatting with Prettier
    cmd: npm run format:check

  clean:
    desc: Remove build artifacts
    cmd: rm -rf dist .astro
